<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#111;
    color:white;
    overflow:hidden;
}

/* Pantalla inicial */
#inicio{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

#inicio h1{
    margin-bottom:30px;
    font-size:40px;
}

#inicio button{
    padding:18px 40px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ff4081;
    color:white;
}

#inicio button:hover{
    background:#ff0066;
}

/* Contenido */
#contenido{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h2{
    font-size:50px;
}
</style>

</head>
<body>

<div id="inicio">
    <h1>🎵 Bienvenido 🎵</h1>
    <button onclick="entrar()">Entrar</button>
</div>

<div id="contenido">
    <h2>Mi Página</h2>
    <p>La música se está reproduciendo de fondo.</p>
</div>

<audio id="musica" loop>
    <source src="Sub.Español.mp3" type="audio/mpeg">
</audio>

<script>

function entrar(){

    const audio=document.getElementById("musica");

    audio.volume=0.4;

    audio.play();

    document.getElementById("inicio").style.display="none";

    document.getElementById("contenido").style.display="flex";

}

</script>

</body>
</html>
