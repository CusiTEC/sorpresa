<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Katty 🌙</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#14102B;
    --night2:#241B47;
    --coral:#FF6F59;
    --gold:#F4C95D;
    --teal:#28C2B5;
    --cream:#FBF1E4;
    --dim: rgba(251,241,228,0.55);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background: radial-gradient(ellipse at 50% -10%, var(--night2), var(--night) 60%);
    font-family:'Inter', sans-serif;
    color:var(--cream);
    overflow-x:hidden;
    position:relative;
  }

  /* ---------- SKY / STARS ---------- */
  .stars{
    position:fixed; inset:0; z-index:0; pointer-events:none;
  }
  .star{
    position:absolute; width:3px; height:3px; background:var(--cream);
    border-radius:50%; opacity:0.25;
    animation: twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:.15} 50%{opacity:.8} }

  /* ---------- SKYLINE (signature element) ---------- */
  .skyline-wrap{
    position:fixed; bottom:0; left:0; width:100%; height:38vh;
    z-index:1; pointer-events:none;
    transition: filter 1s ease;
  }
  .skyline-wrap svg{ width:100%; height:100%; display:block; }
  .glow{
    fill:var(--coral); opacity:0; transition:opacity 1.1s ease, fill 1.1s ease;
  }
  .glow.lit{ opacity:0.9; }
  .sun{
    opacity:0; transition:opacity 1.5s ease, transform 1.5s ease;
    transform:translateY(40px);
  }
  .sun.lit{ opacity:1; transform:translateY(0); }

  /* ---------- LAYOUT ---------- */
  main{
    position:relative; z-index:2;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 32px 20px 30vh;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    letter-spacing:0.18em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--dim);
    margin-bottom:14px;
  }

  .dots{ display:flex; gap:8px; margin-bottom:26px; }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background:rgba(251,241,228,0.18);
    transition: background .4s ease, transform .4s ease;
  }
  .dot.done{ background:var(--gold); transform:scale(1.15); }
  .dot.current{ background:var(--coral); transform:scale(1.3); }

  .card{
    width:100%; max-width:480px;
    background:linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border:1px solid rgba(251,241,228,0.12);
    border-radius:22px;
    padding:36px 30px 30px;
    backdrop-filter: blur(6px);
    text-align:center;
    animation: rise .55s cubic-bezier(.2,.8,.2,1);
    position:relative;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(18px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .icon-wrap{
    width:74px; height:74px; margin:0 auto 18px;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .icon-wrap svg{ width:38px; height:38px; }

  h1{
    font-family:'Unbounded', sans-serif;
    font-weight:800;
    font-size:clamp(22px,5vw,30px);
    line-height:1.2;
    margin:0 0 14px;
    letter-spacing:-0.01em;
  }
  .clue-text{
    font-size:15.5px;
    line-height:1.6;
    color:var(--dim);
    margin:0 0 22px;
  }
  .tag{
    display:inline-block;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--night);
    background:var(--gold);
    padding:4px 10px;
    border-radius:100px;
    margin-bottom:16px;
  }

  .media-frame{
    width:100%; border-radius:14px; overflow:hidden;
    margin: 4px 0 22px; background:rgba(0,0,0,0.25);
    aspect-ratio:16/9;
    display:flex; align-items:center; justify-content:center;
  }
  .media-frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  .media-frame.placeholder{
    flex-direction:column; gap:8px; color:var(--dim); font-size:12px;
    font-family:'JetBrains Mono', monospace; padding:20px;
  }
  .media-frame iframe{ width:100%; height:100%; border:0; }

  .photo-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:4px 0 22px;
  }
  .photo-grid .ph{
    aspect-ratio:1/1; border-radius:12px; overflow:hidden; background:rgba(0,0,0,0.25);
  }
  .photo-grid .ph img{ width:100%; height:100%; object-fit:cover; display:block; }

  button.next{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:14.5px;
    color:var(--night);
    background:var(--cream);
    border:none;
    padding:13px 26px;
    border-radius:100px;
    cursor:pointer;
    transition: transform .2s ease, box-shadow .2s ease;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  button.next:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,0.3); }
  button.next:active{ transform:translateY(0); }

  .final-title{
    font-family:'Unbounded', sans-serif;
    font-weight:800;
    font-size:clamp(28px,7vw,40px);
    background:linear-gradient(90deg,var(--coral),var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin:0 0 6px;
  }
  .final-sub{
    font-family:'JetBrains Mono', monospace;
    font-size:13px; letter-spacing:.06em; color:var(--dim); margin-bottom:18px;
  }
  .ticket{
    border:1px dashed rgba(251,241,228,0.35);
    border-radius:14px; padding:18px; margin:0 0 20px;
    display:flex; justify-content:space-between; text-align:left;
    font-family:'JetBrains Mono', monospace; font-size:12px;
  }
  .ticket div span{ display:block; color:var(--dim); font-size:10px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px;}
  .ticket div b{ font-family:'Unbounded', sans-serif; font-size:14px; }

  /* confetti */
  .confetti{
    position:fixed; top:-10px; z-index:5; pointer-events:none;
    width:8px; height:14px; opacity:0.9;
    animation: fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(540deg); opacity:0.2; }
  }

  footer{
    position:relative; z-index:2;
    text-align:center; font-size:11px; color:var(--dim);
    font-family:'JetBrains Mono', monospace;
    padding-bottom:18px;
  }

  #musicToggle{
    position:fixed; bottom:18px; right:18px; z-index:6;
    width:46px; height:46px; border-radius:50%;
    border:1px solid rgba(251,241,228,0.2);
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    color:var(--cream); font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition: transform .2s ease, background .2s ease;
  }
  #musicToggle:hover{ transform:scale(1.08); background:rgba(255,255,255,0.14); }

  /* ---------- INTRO / PANTALLA DE INICIO ---------- */
  #intro{
    position:fixed; inset:0; z-index:50;
    background: radial-gradient(ellipse at 50% 30%, var(--night2), var(--night) 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:30px;
    transition: opacity .6s ease, visibility .6s ease;
  }
  #intro.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
  .intro-icon{
    font-size:38px; margin-bottom:18px;
    animation: floaty 2.6s ease-in-out infinite;
  }
  @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
  .intro-title{
    font-family:'Unbounded', sans-serif;
    font-weight:800;
    font-size:clamp(28px,7vw,42px);
    line-height:1.2;
    margin-bottom:14px;
    background:linear-gradient(90deg,var(--cream),var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .intro-sub{
    font-size:14px; color:var(--dim); margin-bottom:30px;
    font-family:'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div id="intro">
  <div class="intro-icon">🎵</div>
  <div class="intro-title">Prepárate para<br>la sorpresa</div>
  <p class="intro-sub">Tiene música, así que mejor súbele el volumen.</p>
  <button id="startBtn" class="next">Empezar ✨</button>
</div>

<div class="skyline-wrap">
  <svg viewBox="0 0 800 300" preserveAspectRatio="none">
    <!-- sun / sunrise glow for final reveal -->
    <circle class="sun" id="sun" cx="400" cy="230" r="90" fill="var(--gold)" opacity="0.35"/>
    <!-- sea -->
    <rect x="0" y="250" width="800" height="50" fill="#0d0a1f"/>
    <!-- Pão de Açúcar (sugarloaf) -->
    <path d="M560 250 C 560 190, 600 150, 630 150 C 660 150, 700 190, 700 250 Z" fill="#1c1640"/>
    <!-- Corcovado mount + Cristo silhouette -->
    <path d="M120 250 C 120 170, 170 120, 210 120 C 250 120, 300 170, 300 250 Z" fill="#1c1640"/>
    <rect x="206" y="78" width="8" height="44" fill="#1c1640"/>
    <rect x="180" y="92" width="60" height="7" fill="#1c1640"/>
    <!-- buildings -->
    <g id="buildings">
      <rect x="330" y="200" width="22" height="60" fill="#1c1640"/>
      <rect x="358" y="180" width="22" height="80" fill="#1c1640"/>
      <rect x="386" y="210" width="18" height="50" fill="#1c1640"/>
      <rect x="410" y="190" width="24" height="70" fill="#1c1640"/>
      <rect x="440" y="215" width="16" height="45" fill="#1c1640"/>
      <rect x="462" y="195" width="20" height="65" fill="#1c1640"/>
      <rect x="488" y="205" width="18" height="55" fill="#1c1640"/>
    </g>
    <!-- glow windows, lit progressively -->
    <circle class="glow" data-i="0" cx="338" cy="215" r="3"/>
    <circle class="glow" data-i="1" cx="366" cy="200" r="3"/>
    <circle class="glow" data-i="2" cx="394" cy="225" r="3"/>
    <circle class="glow" data-i="3" cx="420" cy="210" r="3"/>
    <circle class="glow" data-i="4" cx="448" cy="230" r="3"/>
    <circle class="glow" data-i="5" cx="470" cy="215" r="3"/>
    <circle class="glow" data-i="6" cx="495" cy="222" r="3"/>
    <circle class="glow" id="cristo-glow" cx="210" cy="100" r="6" fill="var(--gold)"/>
  </svg>
</div>

<main>
  <div class="eyebrow" id="eyebrow">PARA KATTY</div>
  <div class="dots" id="dots"></div>
  <div class="card" id="card"></div>
</main>

<button id="musicToggle" aria-label="Música">🔈</button>

<audio id="musica" loop>
    <source src="Sub.Español.mp3" type="audio/mpeg">
</audio>

<footer>hecho con cariño · 2026</footer>

<script>
/* ============================================================
   CONFIGURA AQUÍ TUS FOTOS Y VIDEOS
   - Foto de Google Drive: abre el archivo, "Compartir" -> "Cualquier
     persona con el enlace", copia el ID que aparece en la URL
     (.../d/ESTE_ID/view) y pégalo abajo entre comillas.
   - Video de YouTube: copia el ID que va después de "v=" en la URL.
   Si dejas el valor por defecto, se muestra un ícono en su lugar
   (no se rompe el diseño).
============================================================ */
const CONFIG = {
  fotoMemoria: "somos.jpg",   // pista 5 — pon este archivo junto al .html
  fotoFinal1:  "rockinrio.jpg",   // reveal final — pon este archivo junto al .html
  fotoFinal2:  "riojanerio.jpg",   // reveal final — pon este archivo junto al .html
  fototop:    "stay.jpg",      // pista 3, ej: canción de twenty one pilots
  fotoplaya: "playa.jpg",
  gato_beso: "gato-beso.gif",
  gato_feliz: "gato-feliz.gif",
  gato_feliz2: "gato-feliz2.gif",
};

// La música usa el archivo "musica.mp3" — pon ese archivo en la misma
// carpeta que este .html (o cambia el nombre en el <audio> más abajo).
// Las fotos funcionan igual: pon los archivos con esos mismos nombres
// junto al .html, o cambia los nombres arriba para que coincidan
// con tus archivos.

function isPlaceholder(v){
  return !v || v.startsWith("PEGA_AQUI");
}

/* ============================================================
   ICONOS (SVG inline, sin librerías externas)
============================================================ */
const ICONS = {
  globe: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"/></svg>`,
  music: `<svg viewBox="0 0 24 24" fill="var(--gold)"><path d="M9 18V5l11-2v13" stroke="var(--gold)" stroke-width="1.6" fill="none"/><circle cx="6" cy="18" r="3" stroke="var(--gold)" stroke-width="1.6" fill="none"/><circle cx="17" cy="16" r="3" stroke="var(--gold)" stroke-width="1.6" fill="none"/></svg>`,
  mask: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.6"><path d="M4 9c0-3 8-3 8 0M12 9c0-3 8-3 8 0"/><path d="M4 9c0 4 2 7 4 7M20 9c0 4-2 7-4 7"/><circle cx="7" cy="10.5" r="1" fill="var(--gold)"/><circle cx="17" cy="10.5" r="1" fill="var(--gold)"/></svg>`,
  guitar: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.6"><circle cx="8" cy="16" r="4.5"/><path d="M11 13l7-9M16 3l3 1-1 3"/></svg>`,
  heart: `<svg viewBox="0 0 24 24" fill="var(--coral)"><path d="M12 21s-7-4.6-9.5-9C.7 8.2 2 4.5 5.5 4 8 3.6 10 5 12 7c2-2 4-3.4 6.5-3 3.5.5 4.8 4.2 3 8-2.5 4.4-9.5 9-9.5 9z"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.6"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>`,
  plane: `<svg viewBox="0 0 24 24" fill="var(--gold)"><path d="M21 16v-2l-8-5V4.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V18l-3 2v1.5l4.5-1.5 4.5 1.5V20l-3-2v-4.5z"/></svg>`,
};

/* ============================================================
   CONTENIDO DE LAS PISTAS
============================================================ */
const clues = [
  {
    tag: "Preambulo",
    icon: ICONS.heart,
    title: "Se que es una locura",
    text: "Ya se que esto sonará algo loco, pero ya estoy cansado de vivir con miedo... Asi que si mañana no estoy, que sea sin arrepentimientos, dicho esto, sigamos con las pistas",
    media: { type: "photo",  id: CONFIG.gato_beso},
  },
  {
    tag: "Pista 1 · El planeta entero",
    icon: ICONS.globe,
    title: "Hay un lugar donde el verano nunca se acaba y la musica suena…",
    text: "No es un estadio, ni una cumbre, ni una final. Pasa una vez al año en un solo país, y todos los idiomas terminan cantando lo mismo. Tú y yo vamos a estar ahí.",
    media: { type: "photo",  id: CONFIG.gato_feliz},
  },
  {
    tag: "Pista 2 · El idioma sin traducción",
    icon: ICONS.music,
    title: "Lo que vamos a escuchar no necesita subtítulos",
    text: "Va a sonar tan fuerte que no vamos a poder hablar… y no nos va a importar. Vamos a estar rodeados de miles de personas cantando la misma canción al mismo tiempo.",
    media: { type: "photo",  id: CONFIG.gato_feliz2},
  },
  {
    tag: "Pista 3 · El escenario",
    icon: ICONS.guitar,
    title: "El festival de música más grande de Latinoamérica",
    text: "Una ciudad temporal, hecha solo de música, que se enciende por unos días en septiembre. Tiene nombre de roca y nombre de río.",
  },
  {
    tag: "Pista 4 · Una de nuestras bandas favoritas",
    icon: ICONS.mask,
    title: "Máscaras, baterías al hombro y mucha energía",
    text: "Sí, esa banda, la de las dos voces y los videos con máscaras pintadas. Vamos a verlos en vivo. Y es en serio.",
    media: { type: "photo",  id: CONFIG.fototop},
  },
  {
    tag: "Pista 5 · Mar, playa, cultura y relax",
    icon: ICONS.heart,
    title: "Un lugar y momento para relajarnos de todo y escondernos",
    text: "Mucha diversion, paz, calor, arena y mucho por descubrir",
    media: { type: "photo", id: CONFIG.fotoplaya},
  },
  {
    tag: "Pista 6 · Un recuerdo nuestro",
    icon: ICONS.heart,
    title: "Esto no lo vamos a vivir solos en una foto, sino en persona",
    text: "Cada vez que veo esta foto pienso en las ganas que tengo de crear mas recuerdos, pero esta vez con el mar, el calor y mucha música de fondo.",
    media: { type: "photo", id: CONFIG.fotoMemoria},
  },
  {
    tag: "Pista 7 · Marca el calendario",
    icon: ICONS.calendar,
    title: "Del 10 al 16 de setiembre, no hagas planes",
    text: "Esa semana está reservada. No para quedarnos en casa — para subirnos a un avión.",
  },
];

/* ============================================================
   ESTADO Y RENDER
============================================================ */
let step = 0; // 0..clues.length-1 = pistas, clues.length = reveal final
const total = clues.length + 1;

const dotsEl = document.getElementById("dots");
const cardEl = document.getElementById("card");
const eyebrowEl = document.getElementById("eyebrow");

function renderDots(){
  dotsEl.innerHTML = "";
  for(let i=0;i<total;i++){
    const d = document.createElement("div");
    d.className = "dot" + (i < step ? " done" : i === step ? " current" : "");
    dotsEl.appendChild(d);
  }
}

function lightSkyline(i){
  document.querySelectorAll(`.glow[data-i]`).forEach(g=>{
    if(parseInt(g.dataset.i) < i) g.classList.add("lit");
  });
}

function mediaBlock(media){
  if(!media) return "";
  if(media.type === "video"){
    if(isPlaceholder(media.id)){
      return `<div class="media-frame placeholder">${ICONS.music}<span>${media.label}</span></div>`;
    }
    return `<div class="media-frame"><iframe src="https://www.youtube.com/embed/${media.id}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
  }
  if(media.type === "photo"){
    const fallback = `<div class="media-frame placeholder">${ICONS.heart}<span>${media.label}</span></div>`;
    return `<div class="media-frame" id="frame-${media.id}"><img src="${media.id}" alt="foto"/></div>`;
  }
  return "";
}

function renderClue(i){
  const c = clues[i];
  eyebrowEl.textContent = "PARA KATTY";
  cardEl.innerHTML = `
    <div class="tag">${c.tag}</div>
    <div class="icon-wrap">${c.icon}</div>
    <h1>${c.title}</h1>
    <p class="clue-text">${c.text}</p>
    ${mediaBlock(c.media)}
    <button class="next" id="nextBtn">Siguiente pista →</button>
  `;
  lightSkyline(i+1);
  document.getElementById("nextBtn").onclick = next;
}

function renderFinal(){
  eyebrowEl.textContent = "LA SORPRESA";
  document.getElementById("cristo-glow").style.opacity = 1;
  document.getElementById("sun").classList.add("lit");
  document.querySelectorAll(".glow").forEach(g=>g.classList.add("lit"));
  document.querySelector(".skyline-wrap").style.filter = "saturate(1.4) brightness(1.15)";

  const f1 = `<div class="ph"><img src="${CONFIG.fotoFinal1}" alt="foto" onerror="this.closest('.ph').remove();"/></div>`;
  const f2 = `<div class="ph"><img src="${CONFIG.fotoFinal2}" alt="foto" onerror="this.closest('.ph').remove();"/></div>`;
  const gallery = `<div class="photo-grid">${f1}${f2}</div>`;

  cardEl.innerHTML = `
    <div class="icon-wrap">${ICONS.plane}</div>
    <div class="final-title">¡Nos vamos a Río!</div>
    <div class="final-sub">RIO DE JANEIRO · ROCK IN RIO</div>
    ${gallery}
    <div class="ticket">
      <div><span>Destino</span><b>Río de Janeiro, BR</b></div>
      <div><span>Fechas</span><b>10 — 16 SET</b></div>
    </div>
    <p class="clue-text">Vamos a estar ahí, los dos, viendo a Twenty One Pilots y todo lo que trae el Rock in Rio este año. Empaca ropa cómoda, bloqueador, pasaporte y mucha energía — esto recién empieza. Te amo. ❤️</p>
  `;
  launchConfetti();
}

function next(){
  step++;
  renderDots();
  if(step < clues.length){
    renderClue(step);
  } else {
    renderFinal();
  }
}

function launchConfetti(){
  const colors = ["#FF6F59","#F4C95D","#28C2B5","#FBF1E4"];
  for(let i=0;i<70;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2.5 + Math.random()*2) + "s";
    c.style.animationDelay = (Math.random()*0.6) + "s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}

function makeStars(){
  const wrap = document.getElementById("stars");
  for(let i=0;i<60;i++){
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*70 + "vh";
    s.style.animationDelay = (Math.random()*3) + "s";
    wrap.appendChild(s);
  }
}

/* ============================================================
   MÚSICA DE FONDO
   Usa el archivo "musica.mp3" (debe estar en la misma carpeta
   que este .html). Arranca al tocar "Empezar".
============================================================ */
function toggleMusic(){
  const audio = document.getElementById("musica");
  if(audio.paused){
    audio.play();
    document.getElementById("musicToggle").textContent = "🔊";
  } else {
    audio.pause();
    document.getElementById("musicToggle").textContent = "🔈";
  }
}

document.getElementById("startBtn").addEventListener("click", function(){
  document.getElementById("intro").classList.add("hidden");
  const audio = document.getElementById("musica");
  audio.volume = 0.4;
  audio.play();
  document.getElementById("musicToggle").textContent = "🔊";
});

document.getElementById("musicToggle").addEventListener("click", function(e){
  e.stopPropagation();
  toggleMusic();
});

/* init */
makeStars();
renderDots();
renderClue(0);
